{% extends "layouts/base.html" %}
{% block title %}归档 - Match Maintenance{% endblock %}

{% block content %}
<div class="page-header">
    <h1>归档与备份</h1>
</div>

<div class="card">
    <h2>归档文件</h2>
    <div id="archives">加载中...</div>
</div>

<div class="card">
    <h2>备份文件</h2>
    <div id="backups">加载中...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadArchives() {
    try {
        const res = await fetch('/api/v1/archive');
        const data = await res.json();
        
        renderList('archives', data.archives, '暂无归档文件');
        renderList('backups', data.backups, '暂无备份文件');
    } catch (e) {
        document.getElementById('archives').textContent = '加载失败: ' + e.message;
        document.getElementById('backups').textContent = '加载失败: ' + e.message;
    }
}

function renderList(id, items, empty) {
    const el = document.getElementById(id);
    if (!items?.length) {
        el.innerHTML = `<p class="empty-state">${empty}</p>`;
        return;
    }
    
    el.innerHTML = `
        <table>
            <thead><tr><th>文件名</th><th>大小</th><th>时间</th></tr></thead>
            <tbody>
                ${items.map(f => `<tr><td>${f.name}</td><td>${f.size}</td><td>${f.modified}</td></tr>`).join('')}
            </tbody>
        </table>
    `;
}

loadArchives();
</script>
{% endblock %}
